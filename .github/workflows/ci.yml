name: CI

# Quality gate: lint, typecheck and tests must pass before merging.
# Runs on every PR and on pushes to the default branch.
on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The three steps below use `if: always()` so a failure in one still lets
      # the others run — contributors see every problem in a single CI run
      # instead of fixing them one round-trip at a time. The job still fails
      # (red) if any step fails.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        if: always()
        run: npm run typecheck

      - name: Test
        if: always()
        run: npm test -- --ci
