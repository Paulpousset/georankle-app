<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Parchment background -->
    <radialGradient id="parch" cx="42%" cy="36%" r="75%">
      <stop offset="0%" stop-color="#f8f2e3"/>
      <stop offset="55%" stop-color="#f2e8d0"/>
      <stop offset="100%" stop-color="#e3d2ac"/>
    </radialGradient>
    <!-- Navy gradient for main compass points -->
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d4a70"/>
      <stop offset="100%" stop-color="#132040"/>
    </linearGradient>
    <!-- Ochre gradient for diagonal points -->
    <linearGradient id="ochre" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d99a3c"/>
      <stop offset="100%" stop-color="#b06d1f"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#2c1810" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#parch)"/>

    <!-- Faint graticule grid -->
    <g stroke="#c4872a" stroke-width="1.4" opacity="0.16">
      <line x1="0" y1="171" x2="1024" y2="171"/>
      <line x1="0" y1="341" x2="1024" y2="341"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="683" x2="1024" y2="683"/>
      <line x1="0" y1="853" x2="1024" y2="853"/>
      <line x1="171" y1="0" x2="171" y2="1024"/>
      <line x1="341" y1="0" x2="341" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="683" y1="0" x2="683" y2="1024"/>
      <line x1="853" y1="0" x2="853" y2="1024"/>
    </g>

    <!-- Double cartographic frame -->
    <rect x="60" y="60" width="904" height="904" rx="176" fill="none" stroke="#c4872a" stroke-width="9" opacity="0.85"/>
    <rect x="86" y="86" width="852" height="852" rx="156" fill="none" stroke="#a08060" stroke-width="4" opacity="0.7"/>

    <!-- Corner coordinate ticks -->
    <g fill="#a08060" font-family="Courier New, monospace" font-size="34" font-weight="bold" opacity="0.6">
      <text x="120" y="178">48°N</text>
      <text x="760" y="178">2°E</text>
    </g>

    <!-- Compass assembly -->
    <g transform="translate(512,540)" filter="url(#soft)">
      <!-- Bezel ring with degree ticks -->
      <circle r="300" fill="none" stroke="#2c1810" stroke-width="3" opacity="0.18"/>
      <circle r="300" fill="none" stroke="#c4872a" stroke-width="10" opacity="0.5"/>
      <g stroke="#2c1810" opacity="0.45">
        <!-- 36 ticks -->
        <g stroke-width="2.4">
          <line x1="0" y1="-300" x2="0" y2="-280"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(30)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(60)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(90)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(120)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(150)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(180)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(210)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(240)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(270)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(300)"/>
          <line x1="0" y1="-300" x2="0" y2="-280" transform="rotate(330)"/>
        </g>
        <g stroke-width="1.3" opacity="0.7">
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(15)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(45)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(75)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(105)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(135)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(165)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(195)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(225)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(255)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(285)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(315)"/>
          <line x1="0" y1="-300" x2="0" y2="-289" transform="rotate(345)"/>
        </g>
      </g>

      <!-- Diagonal (intercardinal) ochre points -->
      <g fill="url(#ochre)">
        <polygon points="0,0 165,-165 46,-46" transform="rotate(0)"/>
        <polygon points="0,0 165,-165 46,-46" transform="rotate(90)"/>
        <polygon points="0,0 165,-165 46,-46" transform="rotate(180)"/>
        <polygon points="0,0 165,-165 46,-46" transform="rotate(270)"/>
      </g>
      <g fill="#8a5316" opacity="0.55">
        <polygon points="0,0 165,-165 46,-46" transform="rotate(45) scale(0.62)"/>
        <polygon points="0,0 165,-165 46,-46" transform="rotate(135) scale(0.62)"/>
        <polygon points="0,0 165,-165 46,-46" transform="rotate(225) scale(0.62)"/>
        <polygon points="0,0 165,-165 46,-46" transform="rotate(315) scale(0.62)"/>
      </g>

      <!-- Cardinal navy points (E, S, W) -->
      <g fill="url(#navy)">
        <polygon points="0,-248 34,0 -34,0" transform="rotate(90)"/>
        <polygon points="0,-248 34,0 -34,0" transform="rotate(180)"/>
        <polygon points="0,-248 34,0 -34,0" transform="rotate(270)"/>
      </g>
      <!-- highlight facets -->
      <g fill="#3a5a85" opacity="0.6">
        <polygon points="0,-248 34,0 0,0" transform="rotate(90)"/>
        <polygon points="0,-248 34,0 0,0" transform="rotate(180)"/>
        <polygon points="0,-248 34,0 0,0" transform="rotate(270)"/>
      </g>

      <!-- North point — forest green accent -->
      <polygon points="0,-248 34,0 -34,0" fill="#2a6e3f"/>
      <polygon points="0,-248 0,0 -34,0" fill="#1d5430"/>
      <!-- North tip jewel -->
      <polygon points="0,-248 14,-200 -14,-200" fill="#8b1a1a"/>

      <!-- Center hub -->
      <circle r="52" fill="#f8f2e3" stroke="#c4872a" stroke-width="6"/>
      <circle r="30" fill="url(#navy)"/>
      <circle r="12" fill="#c4872a"/>
    </g>
  </g>
</svg>
